<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Laravel Web Demo - Info & Form</title>
</head>
<body>

	<h1 style="text-align:left">Project Info</h1>

	<table border="1" style="border-collapse:collapse;">
		<tr>
			<th style="text-align:left; padding:6px">name</th>
			<td style="padding:6px">github repo for laravel web</td>
		</tr>
		<tr>
			<th style="text-align:left; padding:6px">tech stack</th>
			<td style="padding:6px">php, bootstrap, mysql</td>
		</tr>
		<tr>
			<th style="text-align:left; padding:6px">developer</th>
			<td style="padding:6px">gebe</td>
		</tr>
		<tr>
			<th style="text-align:left; padding:6px">date</th>
			<td style="padding:6px">April 6 2026</td>
		</tr>
		<tr>
			<th style="text-align:left; padding:6px">Goal</th>
			<td style="padding:6px">to learn php laravel</td>
		</tr>
	</table>

	<h2>User Input Form</h2>
	<form action="#" method="post">
		<table>
			<tr>
				<td><label for="name">Name:</label></td>
				<td><input type="text" id="name" name="name" required></td>
			</tr>
			<tr>
				<td><label for="university">University:</label></td>
				<td><input type="text" id="university" name="university"></td>
			</tr>
			<tr>
				<td><label for="address">Address:</label></td>
				<td><input type="text" id="address" name="address"></td>
			</tr>
			<tr>
				<td><label for="email">Email address:</label></td>
				<td><input type="email" id="email" name="email" required></td>
			</tr>
			<tr>
				<td><label for="country">Country:</label></td>
				<td>
					<select id="country" name="country">
						<option value="canada">Canada</option>
						<option value="brazil">Brazil</option>
						<option value="japan">Japan</option>
						<option value="kenya">Kenya</option>
						<option value="germany">Germany</option>
					</select>
				</td>
			</tr>
			<tr>
				<td></td>
				<td><button type="submit">Submit</button></td>
			</tr>
		</table>
	</form>

</body>
</html>
